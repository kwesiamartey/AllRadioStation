<Html>
    
       <body>
       
             <h5 style='text-align: center;'>
                 <img src='https://play-lh.googleusercontent.com/tVb4Q4sHEHd_O8erPbg-r7X8vShdpC_0iQ583pw3RlLLS_DiDlNIcxwhWatlivEsxw' alt='Girl in a jacket' width='100' height='100'/>
             </h5>
        
             <h5 style='text-align: center;'>
              <video id="video" controls type="application/x-mpegURL"></video>
             </h5>
       </body>
</Html>
<script src='https://cdn.jsdelivr.net/npm/hls.js@latest'></script>
<script>
                      if(Hls.isSupported()) {
                        var video = document.getElementById('video');
                        var hls = new Hls();
                        hls.loadSource('https://ny2.stweb.tv/popradio/live/playlist.m3u8');
                                      
                        hls.attachMedia(video);
                        hls.on(Hls.Events.MANIFEST_PARSED,function() {
                          video.play();
                      });
                     }
</script>
