<Html>
    
       <body style='background-color: #000;'>
       
             
                 
             
        
             
              <video controls id='video'></video>>
             
       </body>
</Html>
<script src='https://cdn.jsdelivr.net/npm/hls.js@latest'></script>
<script>
         if(Hls.isSupported()) {
         var video = document.getElementById('video');
         var hls = new Hls();
         hls.loadSource('https://live.amperwave.net/manifest/wvradio-wkwsfmaac-hlsc2.m3u8?source=v7player&user-id=5fabcae6993ff1c07c9e11b1e9eefe15&gpp=DBABLA~BVQqAAAACWA.QA');
                         
         hls.attachMedia(video);
         hls.on(Hls.Events.MANIFEST_PARSED,function() {
         video.play();
       });
    }
</script>
