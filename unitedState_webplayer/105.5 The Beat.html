
<Html>
    
       <body style='background-color: #000;'>
      
             <h5 style='text-align: center;'>
              <video controls auto  id = "video"</video>
             </h5>
       </body>
</Html>
<script src='https://cdn.jsdelivr.net/npm/hls.js@latest'></script>
<script>
         if(Hls.isSupported()) {
         var video = document.getElementById('video');
         var hls = new Hls();
         hls.loadSource('	https://ais-sa1.streamon.fm/7034_48k.aac/playlist.m3u8?listeningSessionID=6513011e00728bec_20916861_WDxZZv1b_MjE2LjIzNS44MC45NTo4MA!!_000001w8x8O&downloadSessionID=0');
                         
         hls.attachMedia(video);
         hls.on(Hls.Events.MANIFEST_PARSED,function() {
         video.play();
       });
    }
</script>
