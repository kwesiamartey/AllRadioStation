
<html>
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom HLS Audio Player with Auto-Reconnect</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Flashy gradient background */
            background: linear-gradient(135deg, #ff6b6b, #f06595, #74c0fc, #82c91e);
            background-size: 400% 400%;
            animation: gradientBackground 10s ease infinite;
        }
        /* Animate the background to give a dynamic look */
        @keyframes gradientBackground {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .audio-player {
            background-color: #fff;
            border: 1px solid #ddd;
            padding: 20px;
            width: 300px;
            text-align: center;
            border-radius: 15px;
            /* Add a shadow to make the player pop */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            position: relative;
            z-index: 1;
        }
        .audio-player button {
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            outline: none;
            font-size: 16px;
            transition: background-color 0.3s ease;
        }
        .audio-player button:hover {
            background-color: #2980b9;
        }
        .audio-player .time {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: bold;
        }
        .audio-player .live {
            color: red;
            font-size: 12px;
            text-transform: uppercase;
        }
        .loading {
            font-size: 16px;
            color: #555;
            margin-bottom: 10px;
        }
    </style>
</head>

       <body>
       
             
                 
             
        
             
              <video controls id='video'></video>
             
       </body>
</html>
<script src='https://cdn.jsdelivr.net/npm/hls.js@latest'></script>
<script>
         if(Hls.isSupported()) {
         var video = document.getElementById('video');
         var hls = new Hls();
         hls.loadSource('https://ample.revma.ihrhls.com/zc305/13_lmrse1561lga02/playlist.m3u8?zip=&streamid=305&pname=live_profile&companionAds=false&dist=iheart&terminalId=159&deviceName=web-mobile&aw_0_1st.playerid=iHeartRadioWebPlayer&listenerId=7a9db39859f0911b629b953cbefe69c0&clientType=web&profileId=8935858168&aw_0_1st.skey=8935858168&host=webapp.US&playedFrom=157&stationid=305&territory=US ');
                         
         hls.attachMedia(video);
         hls.on(Hls.Events.MANIFEST_PARSED,function() {
         video.play();
       });
    }
</script>
