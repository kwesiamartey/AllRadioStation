
<html>
<head>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #ff6b6b, #f06595, #74c0fc, #82c91e);
        background-size: 400% 400%;
        animation: gradientBackground 10s ease infinite;
    }
    @keyframes gradientBackground {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }
    .audio-player {
        background-color: #fff;
        border: 1px solid #ddd;
        padding: 20px;
        width: 300px;
        text-align: center;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        position: relative;
        z-index: 1;
    }
    .audio-player button {
        background-color: #3498db;
        color: white;
        border: none;
        border-radius: 50%;
        width: 50px;
        height: 50px;
        cursor: pointer;
        outline: none;
        font-size: 16px;
        transition: background-color 0.3s ease;
    }
    .audio-player button:hover {
        background-color: #2980b9;
    }
    .audio-player .time {
        margin-top: 20px;
        display: flex;
        justify-content: space-between;
        font-size: 14px;
        font-weight: bold;
    }
    .audio-player .live {
        color: red;
        font-size: 12px;
        text-transform: uppercase;
    }
</style>
</head>
    
   
    <body style='text-align: center;background-color: #000;'>
        
        <iframe src="https://www.cbsnews.com/live/?w=200" id="theiframe"  marginwidth="0" height="200" marginheight="0" align="middle" scrolling="auto"></iframe>
        
    </body>
    
</html>
