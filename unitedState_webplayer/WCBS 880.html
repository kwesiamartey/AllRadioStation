<script>
         if(Hls.isSupported()) {
         var video = document.getElementById('video');
         var hls = new Hls();
         hls.loadSource('https://dai.google.com/linear/hls/pa/event/jeTDC610T-OSPdiWhcl0Pg/stream/4cb55289-6a9d-4f67-b7c2-d51d2fdb2bc0:BRU/variant/72a8cd3a2ea3e75530955182a0b40306/bandwidth/344183.m3u8');
                         
         hls.attachMedia(video);
         hls.on(Hls.Events.MANIFEST_PARSED,function() {
         video.play();
       });
    }
</script>
