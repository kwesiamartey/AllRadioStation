<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HLS Stream with Video.js</title>
    <link href="https://vjs.zencdn.net/7.21.0/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/7.21.0/video.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/videojs-contrib-hls/5.15.0/videojs-contrib-hls.min.js"></script>
</head>
<body style='background-color: #000;text-align: center;'>
     <h5 style='width:100%; text-align: center;'>
          <video id="video" class="video-js vjs-default-skin" controls preload="auto" ></video>
    </h5>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const player = videojs('video');
            player.src({
                src: 'https://live.amperwave.net/manifest/bakerenterprises-weisamaac-hlsc1.m3u8',
                type: 'application/x-mpegURL'
            });
            player.play();
        });
    </script>
</body>
</html>
