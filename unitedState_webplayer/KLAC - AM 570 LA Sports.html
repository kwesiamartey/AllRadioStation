<!DOCTYPE html>
<html>
<head>
    <title>Audio Player</title>
</head>
<body style="background-color: #000;">
    <h5 style="text-align: center;">
        <audio controls autoplay id="audio"></audio>
    </h5>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        if (Hls.isSupported()) {
            var audio = document.getElementById('audio');
            var hls = new Hls();
            hls.loadSource('https://ample.revma.ihrhls.com/69ec53g4w0hvv/57_i6rkdfueck9c02/playlist.m3u8');
            hls.attachMedia(audio);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                audio.play();
            });
        } else if (audio.canPlayType('application/vnd.apple.mpegurl')) {
            audio.src = 'https://ample.revma.ihrhls.com/69ec53g4w0hvv/57_i6rkdfueck9c02/playlist.m3u8';
            audio.addEventListener('canplay', function() {
                audio.play();
            });
        }
    </script>
</body>
</html>
