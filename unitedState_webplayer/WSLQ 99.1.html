    body {
        font-family: Arial, sans-serif;
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #ff6b6b, #f06595, #74c0fc, #82c91e);

        background-color: #3498db;

        outline: none;

        transition: background-color 0.3s ease;
    }
    .audio-player button:hover {
        background-color: #2980b9;
    }
    .audio-player .time {
        margin-top: 20px;

        font-size: 14px;
