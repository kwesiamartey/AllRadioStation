<Html>
    
       <body>
       
             
                 
             
        
             
              <video id="videoPlayer" controls autoplay >
                    Your browser does not support the video tag.
                  </video>
                
                  <script>
                    const videoElement = document.getElementById("videoPlayer");
                    const m3u8Url = "https://cbcradiolive.akamaized.net/hls/live/2041029/ES_R1ELD/adaptive_192/chunklist_ao.m3u8";
                
                    // Set the source of the video element to the M3U8 URL
                    videoElement.src = m3u8Url;
                
                    // Handle errors in case the video cannot be loaded or played
                    videoElement.addEventListener("error", (event) => {
                      console.error("Video playback error:", event);
                    });
                  </script>
             
       </body>
</Html>
