<Html>
    
       <body>
       
             
                 
             
        
             
              <audio controls id="video" autoplay ></audio>
             
       </body>
</Html>
<script src='https://cdn.jsdelivr.net/npm/hls.js@latest'></script>
<script>
         if(Hls.isSupported()) {
         var video = document.getElementById('video');
         var hls = new Hls();
         hls.loadSource('https://cbcradiolive.akamaized.net/hls/live/2041030/ES_R1EMT/adaptive_48/chunklist_ao.m3u8');
                         
         hls.attachMedia(video);
         hls.on(Hls.Events.MANIFEST_PARSED,function() {
         video.play();
       });
    }
</script>
