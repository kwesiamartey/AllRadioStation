<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Live Audio Player</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Flashy gradient background */
            background: linear-gradient(135deg, #ff6b6b, #f06595, #74c0fc, #82c91e);
            background-size: 400% 400%;
            animation: gradientBackground 10s ease infinite;
        }
        /* Animate the background to give a dynamic look */
        @keyframes gradientBackground {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .audio-player {
            background-color: #fff;
            border: 1px solid #ddd;
            padding: 20px;
            width: 300px;
            text-align: center;
            border-radius: 15px;
            /* Add a shadow to make the player pop */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            position: relative;
            z-index: 1;
        }
        .audio-player button {
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            outline: none;
            font-size: 16px;
            transition: background-color 0.3s ease;
        }
        .audio-player button:hover {
            background-color: #2980b9;
        }
        .audio-player .time {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: bold;
        }
        .audio-player .live {
            color: red;
            font-size: 12px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="audio-player">
       <iframe src="https://tunein.com/embed/player/s14839/" style="width:100%; height:100px;" scrolling="no" frameborder="no"></iframe>
    </div>

    <script>
        const audio = document.getElementById('audio');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const currentTimeEl = document.getElementById('currentTime');

        // Play/Pause functionality
        playPauseBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                playPauseBtn.textContent = 'Pause';
            } else {
                audio.pause();
                playPauseBtn.textContent = 'Play';
            }
        });

        // Update current time (no progress bar, only time shown)
        audio.addEventListener('timeupdate', () => {
            const { currentTime } = audio;
            currentTimeEl.textContent = formatTime(currentTime);
        });

        // Format time in mm:ss
        function formatTime(time) {
            const minutes = Math.floor(time / 60);
            const seconds = Math.floor(time % 60);
            return `${minutes < 10 ? '0' : ''}${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
        }

        // Reset play button when audio ends (optional, in case of interruptions)
        audio.addEventListener('ended', () => {
            playPauseBtn.textContent = 'Play';
        });
    </script>
</body>
</html>
