<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Vaasa Stream</title>
</head>
<body>
    <h1>Listen to Radio Vaasa</h1>
    
    <audio id="radioPlayer" controls>
        <source src="https://stream.protonbroadcast.com:8443/radiovaasa.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const audio = document.getElementById('radioPlayer');

            // Autoplay control for mobile browsers
            const playAudio = () => {
                audio.play().catch(error => {
                    console.log('Autoplay was prevented:', error);
                });
            };

            // Ensure user interaction for mobile playback (like Android)
            audio.addEventListener('play', playAudio);

            // Optionally start playback on user interaction (for mobile)
            document.body.addEventListener('click', function () {
                if (audio.paused) {
                    audio.play();
                }
            });
        });
    </script>
</body>
</html>
