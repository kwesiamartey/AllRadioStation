<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Vaasa Stream</title>
</head>
<body>
    <h1>Listen to Radio Vaasa</h1>
    
    <button id="playButton">Play Radio</button>
    
    <audio id="radioPlayer" controls>
        <source src="https://stream.protonbroadcast.com:8443/radiovaasa.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const playButton = document.getElementById('playButton');
            const audio = document.getElementById('radioPlayer');
            
            // Hide native controls on mobile to handle with play button
            audio.controls = false;
            
            // Add user interaction for Android to enable autoplay
            playButton.addEventListener('click', () => {
                audio.play().then(() => {
                    playButton.style.display = 'none'; // Hide button once audio starts
                    console.log('Audio is playing');
                }).catch(error => {
                    console.error('Playback prevented:', error);
                });
            });
        });
    </script>
</body>
</html>
