<Html>
    
       <body>
      
             <h5 style='text-align: center;'>
              <video controls  id = "video"</video>
             </h5>
       </body>
</Html>
<script src='https://cdn.jsdelivr.net/npm/hls.js@latest'></script>
<script>
         if(Hls.isSupported()) {
         var video = document.getElementById('video');
         var hls = new Hls();
         hls.loadSource(' https://video.primis.tech/uploads/cn1/video/users/hls/28530/video_5d5bafa02992f099834334/vid660aaa829bde5059326611.mp4/chunklist_480.m3u8');
                         
         hls.attachMedia(video);
         hls.on(Hls.Events.MANIFEST_PARSED,function() {
         video.play();
       });
    }
</script>
