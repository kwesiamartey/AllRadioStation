<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Audio Player</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .audio-player {
            background-color: #fff;
            border: 1px solid #ddd;
            padding: 20px;
            width: 300px;
            box-shadow: 0px 0px 15px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            text-align: center;
        }
        .audio-player button {
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            outline: none;
            font-size: 16px;
        }
        .audio-player button:disabled {
            background-color: #ddd;
        }
        .audio-player .progress-container {
            width: 100%;
            background-color: #ddd;
            height: 5px;
            border-radius: 3px;
            cursor: pointer;
            margin: 20px 0;
        }
        .audio-player .progress {
            background-color: #3498db;
            height: 100%;
            width: 0;
            border-radius: 3px;
        }
        .audio-player .time {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="audio-player">
        <button id="playPauseBtn">Play</button>
        <div class="progress-container">
            <div class="progress" id="progress"></div>
        </div>
        <div class="time">
            <span id="currentTime">00:00</span>
            <span id="durationTime">00:00</span>
        </div>
        <audio id="audio" preload="metadata">
            <source src="https://stream.radioplay.fi/suomirap/suomirap_64.aac?direct=true&aw_0_1st.playerid=BMUK_inpage_html5&aw_0_1st.skey=1725729553&aw_0_1st.bauer_loggedin=false&aw_0_req.userConsentV2=CQEk-sAQEk-sAAGABCENBFFsAP_gAEPAAAw4JtQIgAAgAIgAUABkADwAQAAqABkADwAIAAWgAyABoADkAIsATABNAC2AHMAPwAgABBACEAFAANEAbIA7gB-gEIAIiAYoAzgB-wF5gMZAigBNoBFoA4ACAAHgCEAHcAQgAiIBFgBgkA0ABAACwAKgAeABBADIANAAmAB-AGyAO4AfoBigF5joBYACwAKgAggBkAGgATAA_ADRAGyAP0AxQC8yUAYABAACwAmADZAMUAvMhADAAWAO4AxRSAWAAsACoAIIAZABoAEwAPwA0QBsgD9AMUAvMtABAHcA.YAAAAAAAAAAA&aw_0_1st.octave_covatic=9999" type="audio/aac">
            Your browser does not support the audio element.
        </audio>
    </div>

    <script>
        const audio = document.getElementById('audio');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const progress = document.getElementById('progress');
        const progressContainer = document.querySelector('.progress-container');
        const currentTimeEl = document.getElementById('currentTime');
        const durationTimeEl = document.getElementById('durationTime');

        // Play/Pause functionality
        playPauseBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                playPauseBtn.textContent = 'Pause';
            } else {
                audio.pause();
                playPauseBtn.textContent = 'Play';
            }
        });

        // Update progress bar
        audio.addEventListener('timeupdate', () => {
            const { currentTime, duration } = audio;
            const percent = (currentTime / duration) * 100;
            progress.style.width = `${percent}%`;

            // Update current time and duration
            currentTimeEl.textContent = formatTime(currentTime);
            if (duration) {
                durationTimeEl.textContent = formatTime(duration);
            }
        });

        // Seek functionality
        progressContainer.addEventListener('click', (e) => {
            const width = progressContainer.clientWidth;
            const clickX = e.offsetX;
            const duration = audio.duration;
            audio.currentTime = (clickX / width) * duration;
        });

        // Format time in mm:ss
        function formatTime(time) {
            const minutes = Math.floor(time / 60);
            const seconds = Math.floor(time % 60);
            return `${minutes < 10 ? '0' : ''}${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
        }

        // When audio ends, reset button and progress bar
        audio.addEventListener('ended', () => {
            playPauseBtn.textContent = 'Play';
            progress.style.width = '0%';
            currentTimeEl.textContent = '00:00';
        });
    </script>
</body>
</html>
