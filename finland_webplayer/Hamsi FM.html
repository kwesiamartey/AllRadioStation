<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Live Audio Player</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .audio-player {
            background-color: #fff;
            border: 1px solid #ddd;
            padding: 20px;
            width: 300px;
            box-shadow: 0px 0px 15px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            text-align: center;
        }
        .audio-player button {
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            outline: none;
            font-size: 16px;
        }
        .audio-player button:disabled {
            background-color: #ddd;
        }
        .audio-player .time {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: bold;
        }
        .audio-player .live {
            color: red;
            font-size: 12px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="audio-player">
        <button id="playPauseBtn">Play</button>
        <div class="time">
            <span id="currentTime">00:00</span>
            <span class="live">Live</span>
        </div>
        <audio id="audio" preload="metadata">
            <source src="https://stream.radioplay.fi/nostalgia/nostalgia_64.aac" type="audio/aac">
            Your browser does not support the audio element.
        </audio>
    </div>

    <script>
        const audio = document.getElementById('audio');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const currentTimeEl = document.getElementById('currentTime');

        // Play/Pause functionality
        playPauseBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                playPauseBtn.textContent = 'Pause';
            } else {
                audio.pause();
                playPauseBtn.textContent = 'Play';
            }
        });

        // Update current time (no progress bar, only time shown)
        audio.addEventListener('timeupdate', () => {
            const { currentTime } = audio;
            currentTimeEl.textContent = formatTime(currentTime);
        });

        // Format time in mm:ss
        function formatTime(time) {
            const minutes = Math.floor(time / 60);
            const seconds = Math.floor(time % 60);
            return `${minutes < 10 ? '0' : ''}${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
        }

        // Reset play button when audio ends (optional, in case of interruptions)
        audio.addEventListener('ended', () => {
            playPauseBtn.textContent = 'Play';
        });
    </script>
</body>
</html>
