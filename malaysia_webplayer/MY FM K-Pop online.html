
<!DOCTYPE html>
<html>

      html {

      #top{
          height:80px;

</head>
<body>
    
    
   <div id="top"></div>
    
  <video id="videoPlayer" controls autoplay >
    Your browser does not support the video tag.

  <script>
    const videoElement = document.getElementById("videoPlayer");
    const m3u8Url = "https://astro1.rastream.com/myfm.web.hls/playlist.m3u8?listeningSessionID=64663cff008c63c8_8205622_DZqp5dBy_MTAzLjIxLjgxLjk6ODA!_000000bzRn3&downloadSessionID=0&authtoken=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJleHAiOjE2OTI3MTM5MDMsImlhdCI6MTY5MjYyNzUwMywib2lkIjoiZXJhLXlvdXR1YmUifQ.3Wg-fPqaSHUdBSIb2uLnnvnuF8uL0gkzrjfTEfPZrxw&awparams=companionads%3Atrue%3Btags%3Aradioactive%3Bstationid%3Amyfm&listenerid=a833156bb26890690cf3e9145dc090f8&lan=%5B%22zh%22%5D&setLanguage=true";

    // Set the source of the video element to the M3U8 URL
    videoElement.src = m3u8Url;

    });
