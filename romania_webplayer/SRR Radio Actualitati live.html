<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Stream</title>
    <style>
      body {
            font-family: Arial, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Flashy gradient background */
            background: linear-gradient(135deg, #ff6b6b, #f06595, #74c0fc, #82c91e);
            background-size: 400% 400%;
            animation: gradientBackground 10s ease infinite;
        }
        /* Animate the background to give a dynamic look */
        @keyframes gradientBackground {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .audio-player {
            background-color: #fff;
            border: 1px solid #ddd;
            padding: 20px;
            width: 300px;
            text-align: center;
            border-radius: 15px;
            /* Add a shadow to make the player pop */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            position: relative;
            z-index: 1;
        }
        .audio-player button {
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            outline: none;
            font-size: 16px;
            transition: background-color 0.3s ease;
        }
        .audio-player button:hover {
            background-color: #2980b9;
        }
        .audio-player .time {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: bold;
        }
        .audio-player .live {
            color: red;
            font-size: 12px;
            text-transform: uppercase;
        }
    </style>
</head>
<body  style="background-color: #000; width: 100%; height: 100%; margin: 0; display: flex; align-items: center; justify-content: center;">
    <h1></h1>
    <h1 style='width:100%;text-align: center;'>
    <audio controls>
        <source src="https://stream4.srr.ro:8443/romania-actualitati" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>
    </h1>
</body>
</html>
