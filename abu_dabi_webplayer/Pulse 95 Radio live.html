<Html>
    
       <body  style="background-color: #000; width: 100%; height: 100%; margin: 0; display: flex; align-items: center; justify-content: center;">
       
             <h5 style='text-align: center;'>
                 
             </h5>
        
             <h5 style='text-align: center;'>
              <video id="video" controls type="application/x-mpegURL"></video>
             </h5>
       </body>
</Html>
<script src='https://cdn.jsdelivr.net/npm/hls.js@latest'></script>
<script>
                      if(Hls.isSupported()) {
                        var video = document.getElementById('video');
                        var hls = new Hls();
                        hls.loadSource('https://svs.itworkscdn.net/pulse95live/pulse96/chunks.m3u8');
                                      
                        hls.attachMedia(video);
                        hls.on(Hls.Events.MANIFEST_PARSED,function() {
                          video.play();
                      });
                     }
</script>
