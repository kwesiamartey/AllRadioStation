       <body>
       
             <h5 style='text-align: center;'>
                 <img src='http://stnfoundation.com/playstore/istanbul_logo/d2whj3drafve.png' alt='Girl in a jacket' width='100' height='100'/>
             </h5>
        
             <h5 style='text-align: center;'>
                 <video controls id="video"></video>
             </h5>
       </body>
</Html>

<script src='https://cdn.jsdelivr.net/npm/hls.js@latest'></script>
<script>
                      if(Hls.isSupported()) {
                        var video = document.getElementById('video');
                        var hls = new Hls();
                        hls.loadSource('https://moondigitaledge.radyotvonline.net/palstation/playlist.m3u8');
                        hls.attachMedia(video);
                        hls.on(Hls.Events.MANIFEST_PARSED,function() {
                          video.play();
                      });
                     }
</script>
