<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Audio Player with Loading Indicator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121a27;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .audio-player {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            background-color: #1a2639;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            position: relative;
        }

        .audio-player button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 24px;
            color: white;
            transition: color 0.3s ease;
        }

        .audio-player button:hover {
            color: #f06543;
        }

        .audio-player button#playPauseBtn {
            width: 40px;
            height: 40px;
            background-color: #f06543;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            border-radius: 5px;
            font-size: 20px;
            position: relative;
        }

        /* Loading spinner */
        .loading-spinner {
            width: 30px;
            height: 30px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            position: absolute;
            top: 5px;
            left: 5px;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="audio-player">
    <button id="favoriteBtn">❤️</button>
    <button id="prevBtn">⏮️</button>

    <!-- Play/Pause button with loading spinner -->
    <div id="playPauseBtnWrapper" style="position: relative;">
        <div class="loading-spinner" id="loadingSpinner"></div> <!-- Loading Spinner -->
        <button id="playPauseBtn">⏯️</button>
    </div>

    <button id="nextBtn">⏭️</button>
    <button id="volumeBtn">🔊</button>
</div>

<audio id="audio" preload="metadata" style="display:none;"></audio>

<!-- HLS.js library for streaming .m3u8 -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
    const audio = document.getElementById('audio');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const loadingSpinner = document.getElementById('loadingSpinner');
    
    // HLS stream URL (replace with your .m3u8 stream)
    const hlsUrl = 'https://moondigitaledge2.radyotvonline.net/radyo7slow/playlist.m3u8'; // Add the .m3u8 URL here

    let hls;

    function initHls() {
        if (Hls.isSupported()) {
            hls = new Hls();
            hls.loadSource(hlsUrl);
            hls.attachMedia(audio);

            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                console.log("Manifest loaded");
                playPauseBtn.disabled = false; // Enable play button
            });

            // Show loading spinner while loading
            audio.addEventListener('waiting', () => {
                loadingSpinner.style.display = 'block'; // Show loading spinner
            });

            // Hide spinner when audio starts playing
            audio.addEventListener('playing', () => {
                loadingSpinner.style.display = 'none'; // Hide loading spinner
            });

            // Hide spinner if playback is paused or ended
            audio.addEventListener('pause', () => {
                loadingSpinner.style.display = 'none'; // Hide loading spinner
            });
        } else if (audio.canPlayType('application/vnd.apple.mpegurl')) {
            // For Safari or native HLS support
            audio.src = hlsUrl;

            audio.addEventListener('waiting', () => {
                loadingSpinner.style.display = 'block';
            });

            audio.addEventListener('playing', () => {
                loadingSpinner.style.display = 'none';
            });
        }
    }

    initHls();

    // Play/Pause button functionality
    playPauseBtn.addEventListener('click', () => {
        if (audio.paused) {
            audio.play();
            playPauseBtn.textContent = '⏸️'; // Change to pause icon
        } else {
            audio.pause();
            playPauseBtn.textContent = '⏯️'; // Change to play icon
        }
    });

    // Volume button (placeholder for functionality)
    document.getElementById('volumeBtn').addEventListener('click', () => {
        audio.muted = !audio.muted;
        document.getElementById('volumeBtn').textContent = audio.muted ? '🔇' : '🔊';
    });
</script>

</body>
</html>
