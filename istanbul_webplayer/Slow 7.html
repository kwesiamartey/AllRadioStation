<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Audio Player</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121a27;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .audio-player {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            background-color: #1a2639;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            position: relative; /* Position relative for the spinner */
        }

        .audio-player button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 24px;
            color: white;
            transition: color 0.3s ease;
        }

        .audio-player button:hover {
            color: #f06543;
        }

        .audio-player button#playPauseBtn {
            width: 60px; /* Increased size */
            height: 60px; /* Increased size */
            background-color: #f06543;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            border-radius: 50%; /* Made circular */
            font-size: 20px;
            position: relative; /* Position relative for the spinner */
            z-index: 2; /* Ensure the button is above the spinner */
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3); /* Background */
            border-top: 4px solid white; /* Spinner color */
            border-radius: 50%;
            width: 70px; /* Increased size */
            height: 70px; /* Increased size */
            animation: spin 1s linear infinite;
            position: absolute; /* Position absolute */
            z-index: 1; /* Below the play button */
            display: none; /* Initially hidden */
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading {
            display: none; /* Hide the loading message initially */
        }

        .error-message {
            color: red;
            font-size: 16px;
            margin-top: 10px;
            display: none; /* Hide initially */
        }
    </style>
</head>
<body>

<div class="audio-player">
    <button id="favoriteBtn">❤️</button>
    <button id="prevBtn">⏮️</button>
    <div class="spinner" id="spinner"></div> <!-- Spinner added here -->
    <button id="playPauseBtn">⏯️</button>
    <button id="nextBtn">⏭️</button>
    <button id="volumeBtn">🔊</button>
</div>
<div class="error-message" id="error-message">Server down or invalid link</div> <!-- Error message -->

<audio id="audio" preload="metadata" style="display:none;"></audio>

<!-- HLS.js library for streaming .m3u8 -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
    const audio = document.getElementById('audio');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const spinner = document.getElementById('spinner');
    const errorMessage = document.getElementById('error-message');
    
    // Array of supported audio formats (add any other formats as needed)
    const supportedFormats = ['audio/mp3', 'audio/wav', 'audio/ogg', 'audio/mpeg', 'application/vnd.apple.mpegurl'];

    // HLS stream URL (replace with your .m3u8 stream)
    const hlsUrl = 'https://moondigitaledge2.radyotvonline.net/radyo7slow/playlist.m3u8'; // Add the .m3u8 URL here

    let hls;

    function initHls() {
        if (Hls.isSupported()) {
            spinner.style.display = 'block'; // Show the spinner when loading
            hls = new Hls();
            hls.loadSource(hlsUrl);
            hls.attachMedia(audio);

            // Hide spinner once the manifest is parsed
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                spinner.style.display = 'none';
            });

            // Error handling for HLS
            hls.on(Hls.Events.ERROR, function(event, data) {
                if (data.fatal) {
                    handleHlsError(data);
                }
            });
        } else if (audio.canPlayType('application/vnd.apple.mpegurl')) {
            // For Safari or native HLS support
            audio.src = hlsUrl;
        } else {
            handleUnsupportedFormat();
        }
    }

    function handleUnsupportedFormat() {
        errorMessage.textContent = 'Unsupported audio format.';
        errorMessage.style.display = 'block';
    }

    function handleHlsError(data) {
        switch (data.fatal) {
            case Hls.ErrorTypes.NETWORK_ERROR:
                errorMessage.textContent = 'Network error: Server down or invalid link';
                break;
            case Hls.ErrorTypes.MEDIA_ERROR:
                errorMessage.textContent = 'Media error: Unable to play the stream';
                break;
            case Hls.ErrorTypes.OTHER_ERROR:
                errorMessage.textContent = 'An unknown error occurred';
                break;
        }
        errorMessage.style.display = 'block';
        spinner.style.display = 'none'; // Hide spinner on error
    }

    initHls();

    // Play/Pause button functionality
    playPauseBtn.addEventListener('click', () => {
        if (audio.paused) {
            audio.play();
            playPauseBtn.textContent = '⏸️'; // Change to pause icon
            spinner.style.display = 'block'; // Show the spinner while playing
            errorMessage.style.display = 'none'; // Hide error message
        } else {
            audio.pause();
            playPauseBtn.textContent = '▶️'; // Change to play icon
            spinner.style.display = 'none'; // Hide the spinner when paused
        }
    });

    // Volume button (placeholder for functionality)
    document.getElementById('volumeBtn').addEventListener('click', () => {
        audio.muted = !audio.muted;
        document.getElementById('volumeBtn').textContent = audio.muted ? '🔇' : '🔊';
    });

    // Error handling for audio
    audio.addEventListener('error', () => {
        errorMessage.textContent = 'Server down or invalid link';
        errorMessage.style.display = 'block';
        spinner.style.display = 'none'; // Hide spinner on error
    });
</script>

</body>
</html>
