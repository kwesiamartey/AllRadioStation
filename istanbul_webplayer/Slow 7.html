<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: #0b2c44;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
        }

        .player-controls {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background-color: #14293e;
            padding: 10px;
            border-radius: 10px;
        }

        .player-controls button {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            outline: none;
            position: relative;
        }

        /* Play button with circular progress */
        .playPauseBtn-container {
            position: relative;
            width: 60px;
            height: 60px;
        }

        .playPauseBtn-container button {
            background-color: orange;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            font-size: 30px;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Circular progress bar (white) */
        .circular-progress {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 5px solid white;
            clip: rect(0, 60px, 60px, 30px);
        }

        .circular-progress .circle {
            border-radius: 50%;
            position: absolute;
            clip: rect(0, 30px, 60px, 0);
            background-color: transparent;
            border: 5px solid white;
            width: 100%;
            height: 100%;
            transform: rotate(0deg);
            transform-origin: center;
        }

        /* Volume button */
        button#volumeBtn {
            background: none;
            font-size: 30px;
        }

        /* Love icon */
        button#loveBtn {
            font-size: 30px;
            color: red;
            background: none;
            border: none;
            cursor: pointer;
        }

    </style>
    <title>Custom Audio Player</title>
</head>
<body>

    <div class="player-controls">
        <button id="loveBtn">❤️</button> <!-- Love Icon Button -->
        <button id="prevBtn">⏮️</button>
        
        <!-- Play/Pause button with circular progress bar -->
        <div class="playPauseBtn-container">
            <div class="circular-progress">
                <div class="circle" id="progressCircle"></div>
            </div>
            <button id="playPauseBtn">⏯️</button>
        </div>
        
        <button id="nextBtn">⏭️</button>
        <button id="volumeBtn">🔊</button>
    </div>

    <audio id="audio" preload="metadata"></audio>

    <!-- hls.js for playing .m3u8 streams in non-Safari browsers -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <script>
        const audio = document.getElementById('audio');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const volumeBtn = document.getElementById('volumeBtn');
        const progressCircle = document.getElementById('progressCircle');

        // HLS stream URL
        const hlsUrl = 'https://moondigitaledge2.radyotvonline.net/radyo7slow/playlist.m3u8';

        let hls;

        function initHls() {
            if (Hls.isSupported()) {
                hls = new Hls();
                hls.loadSource(hlsUrl);
                hls.attachMedia(audio);

                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    console.log("Manifest loaded");
                    playPauseBtn.disabled = false;  // Enable play button after loading
                });

                hls.on(Hls.Events.ERROR, function(event, data) {
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                console.log("Network error, trying to recover...");
                                hls.startLoad();  // Try to reload the stream
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                console.log("Media error, recovering...");
                                hls.recoverMediaError();
                                break;
                            default:
                                console.log("Unrecoverable error, destroying HLS...");
                                hls.destroy();
                                initHls();  // Re-initialize the HLS stream
                                break;
                        }
                    }
                });
            } else if (audio.canPlayType('application/vnd.apple.mpegurl')) {
                audio.src = hlsUrl;
                audio.addEventListener('canplay', function() {
                    console.log("HLS natively supported in this browser");
                });
            }
        }

        initHls();

        // Play/Pause functionality
        playPauseBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                playPauseBtn.textContent = '⏸️'; // Update the button to Pause
            } else {
                audio.pause();
                playPauseBtn.textContent = '⏯️'; // Update the button to Play
            }
        });

        // Update circular progress bar as the audio plays
        audio.addEventListener('timeupdate', () => {
            const progressPercentage = (audio.currentTime / audio.duration) * 360;
            progressCircle.style.transform = `rotate(${progressPercentage}deg)`;
        });

        // Volume button functionality (mute/unmute)
        volumeBtn.addEventListener('click', () => {
            audio.muted = !audio.muted;
            volumeBtn.textContent = audio.muted ? '🔇' : '🔊'; // Toggle volume icon
        });

    </script>

</body>
</html>
