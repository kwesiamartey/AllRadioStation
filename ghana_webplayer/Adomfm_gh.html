



<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Audio Player</title>
    <style>
        /* Styles remain the same */
    </style>
</head>
<body>

<div class="audio-player">
    <button id="favoriteBtn">❤️</button>
    <button id="prevBtn">⏮️</button>
    <div class="spinner" id="spinner"></div>
    <button id="playPauseBtn">⏯️</button>
    <button id="nextBtn">⏭️</button>
    <button id="volumeBtn">🔊</button>
</div>
<div class="error-message" id="error-message">Server down or invalid link</div>

<audio id="audio" preload="metadata" style="display:none;"></audio>

<!-- HLS.js library for streaming .m3u8 -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
    const audio = document.getElementById('audio');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const spinner = document.getElementById('spinner');
    const errorMessage = document.getElementById('error-message');

    // Array of audio URLs for different formats
    const audioUrls = {
        mp3: 'https://example.com/audio/file.mp3',
        ogg: 'https://example.com/audio/file.ogg',
        wav: 'https://example.com/audio/file.wav',
        m3u8: 'https://moondigitaledge2.radyotvonline.net/radyo7slow/playlist.m3u8', // .m3u8 URL
        // Add more formats as needed
    };

    let currentFormat = 'https://mmg.streamguys1.com/AdomFM-mp3?key=63d8990dfe4438ae984fd70d2d2b4bd31c842c474987bd810ac0e8e0fd62e8cf2015661105cced63ccfdca89a8422ab1'; // Set your desired format (can be changed to mp3, ogg, wav)
    let hls;

    function initHls() {
        const hlsUrl = audioUrls[currentFormat]; // Get the URL based on the current format
        
        if (Hls.isSupported() && currentFormat === 'm3u8') {
            spinner.style.display = 'block';
            hls = new Hls();
            hls.loadSource(hlsUrl);
            hls.attachMedia(audio);

            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                spinner.style.display = 'none';
            });

            hls.on(Hls.Events.ERROR, function(event, data) {
                if (data.fatal) {
                    handleHlsError(data);
                }
            });
        } else if (audio.canPlayType('audio/' + currentFormat) || currentFormat === 'm3u8') {
            // For supported formats and native HLS support
            audio.src = hlsUrl;
        } else {
            handleUnsupportedFormat();
        }
    }

    function handleUnsupportedFormat() {
        errorMessage.textContent = 'Unsupported audio format.';
        errorMessage.style.display = 'block';
    }

    function handleHlsError(data) {
        switch (data.fatal) {
            case Hls.ErrorTypes.NETWORK_ERROR:
                errorMessage.textContent = 'Network error: Server down or invalid link';
                break;
            case Hls.ErrorTypes.MEDIA_ERROR:
                errorMessage.textContent = 'Media error: Unable to play the stream';
                break;
            case Hls.ErrorTypes.OTHER_ERROR:
                errorMessage.textContent = 'An unknown error occurred';
                break;
        }
        errorMessage.style.display = 'block';
        spinner.style.display = 'none';
    }

    initHls();

    // Play/Pause button functionality
    playPauseBtn.addEventListener('click', () => {
        if (audio.paused) {
            audio.play();
            playPauseBtn.textContent = '⏸️'; // Change to pause icon
            spinner.style.display = 'block'; // Show spinner while playing
            errorMessage.style.display = 'none';
        } else {
            audio.pause();
            playPauseBtn.textContent = '▶️'; // Change to play icon
            spinner.style.display = 'none';
        }
    });

    // Volume button functionality
    document.getElementById('volumeBtn').addEventListener('click', () => {
        audio.muted = !audio.muted;
        document.getElementById('volumeBtn').textContent = audio.muted ? '🔇' : '🔊';
    });

    // Error handling for audio
    audio.addEventListener('error', () => {
        errorMessage.textContent = 'Server down or invalid link';
        errorMessage.style.display = 'block';
        spinner.style.display = 'none'; // Hide spinner on error
    });
</script>

</body>
</html>
