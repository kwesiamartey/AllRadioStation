<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Stream</title>
</head>
<body>
    <audio id="radioPlayer" controls>
        Your browser does not support the audio element.
    </audio>
    <script>
        // Create a new Audio object
        var audio = new Audio('http://peacefm.atunwadigital.streamguys1.com/peacefm');
        // Set the audio object to the audio element
        document.getElementById('radioPlayer').src = audio.src;
        // Play the audio
        audio.play().catch(error => {
            console.error('Error playing audio:', error);
        });
    </script>
</body>
</html>
