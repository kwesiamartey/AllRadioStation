<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Audio Player with Spinner</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121a27;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .audio-player {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            background-color: #1a2639;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            position: relative; /* Positioning context for the spinner */
        }

        .audio-player button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 24px;
            color: white;
            transition: color 0.3s ease;
        }

        .audio-player button:hover {
            color: #f06543;
        }

        .audio-player button#playPauseBtn {
            width: 50px;
            height: 50px;
            background-color: #f06543;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            border-radius: 50%; /* Make it circular */
            font-size: 24px;
            position: relative; /* Positioning context for the spinner */
            z-index: 1; /* Ensure the button is above the spinner */
        }

        .spinner {
            position: absolute;
            width: 70px; /* Size of the spinner */
            height: 70px; /* Size of the spinner */
            border: 8px solid rgba(255, 255, 255, 0.3);
            border-top: 8px solid #f06543; /* Color of the spinner */
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none; /* Hidden by default */
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); /* Center the spinner */
            z-index: 0; /* Place behind the button */
        }

        @keyframes spin {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="audio-player">
    <button id="playPauseBtn">⏯️</button>
    <div class="spinner" id="spinner"></div>
</div>


<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
    const audio = new Audio();
    let hls;
    let isPlaying = false;
    const spinner = document.getElementById('spinner');
    const playPauseBtn = document.getElementById('playPauseBtn');

    // List of audio URLs (replace with your own sources)
    const audioUrls = [
        'http://node-04.zeno.fm/yh5n6v6xr0quv?rj-ttl=5&rj-tok=AAABeQPmGBEAe8-ahooZ8tz4OA',         // MP3 format
    ];

    let currentAudioIndex = 0;

    // Function to detect the audio format and play accordingly
    function initAudioPlayer() {
        const currentUrl = audioUrls[currentAudioIndex];
        audio.src = currentUrl;
        const audioExtension = currentUrl.split('.').pop().toLowerCase();

        // Show the spinner when loading starts
        showSpinner(true);

        // If it's an HLS (m3u8) stream, use HLS.js
        if (audioExtension === 'm3u8') {
            if (Hls.isSupported()) {
                if (hls) {
                    hls.destroy(); // Destroy the previous instance if any
                }
                hls = new Hls();
                hls.loadSource(currentUrl);
                hls.attachMedia(audio);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    showSpinner(false); // Hide the spinner once the audio is ready
                });
                hls.on(Hls.Events.ERROR, (event, data) => {
                    showSpinner(false); // Hide the spinner on error
                    alert('HLS stream could not be loaded.');
                });
            } else if (audio.canPlayType('application/vnd.apple.mpegurl')) {
                // For Safari or native HLS support
                audio.src = currentUrl;
                audio.addEventListener('canplay', () => {
                    showSpinner(false); // Hide the spinner when audio is ready
                });
            } else {
                alert('HLS is not supported in this browser.');
                return;
            }
        } else {
            // Use native HTML5 audio for other formats
            audio.addEventListener('canplay', () => {
                showSpinner(false); // Hide the spinner when audio is ready
            });
        }

        // Handle error events for unsupported formats
        audio.addEventListener('error', function() {
            showSpinner(false); // Hide the spinner on error
            alert('Error playing this audio format.');
        });
    }

    // Show or hide the spinner
    function showSpinner(show) {
        spinner.style.display = show ? 'block' : 'none';
    }

    // Play/pause functionality
    playPauseBtn.addEventListener('click', () => {
        if (!isPlaying) {
            audio.play();
            playPauseBtn.textContent = 'Pause';
            showSpinner(false); // Hide the spinner when playing starts
            isPlaying = true;
        } else {
            audio.pause();
            playPauseBtn.textContent = 'Play';
            isPlaying = false;
        }
    });

    // Load the initial audio
    initAudioPlayer();
</script>

</body>
</html>
